name: Oppdater værdata

on:
  workflow_dispatch:
  schedule:
    # Hver morgen 05:30 UTC (06:30/07:30 norsk tid)
    - cron: "30 5 * * *"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install requests

      - name: Kjør tester
        run: python scripts/test_period_detection.py

      - name: Bygg datafiler fra Frost
        env:
          FROST_CLIENT_ID: ${{ secrets.FROST_CLIENT_ID }}
        run: python scripts/build_weather_data.py

      - name: Commit oppdaterte data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Ingen endringer i data/"
          else
            git commit -m "Oppdater værdata ($(date -u +%Y-%m-%d))"
            git push
          fi
